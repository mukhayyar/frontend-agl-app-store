<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AGL App Store</title>
  <defs>
    <linearGradient id="aglStoreBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="aglStoreShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square badge -->
  <rect width="180" height="180" rx="38" fill="url(#aglStoreBg)"/>
  <rect width="180" height="180" rx="38" fill="url(#aglStoreShine)"/>

  <!-- Bold "A" monogram -->
  <g fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M42 140 L90 36 L138 140"/>
    <path d="M64 102 L116 102"/>
  </g>

  <!-- Storefront shelf: three app tiles below the A -->
  <g fill="#FFFFFF">
    <rect x="62" y="150" width="12" height="12" rx="2.5"/>
    <rect x="84" y="150" width="12" height="12" rx="2.5"/>
    <rect x="106" y="150" width="12" height="12" rx="2.5"/>
  </g>
</svg>
